name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run ruff format --check src/ tests/ scripts/
      - name: Type check (ty)
        run: uv run ty check
        continue-on-error: true  # advisory for now; ty still reports pre-existing diagnostics

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - run: uv run pytest --cov=mcp_server_tempest --cov-report=xml --cov-report=term

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --group dev
      - name: Manifest is in sync with pyproject
        run: uv run python scripts/gen_manifest.py --check
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
