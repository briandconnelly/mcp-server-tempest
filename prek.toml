default_install_hook_types = ["pre-commit", "pre-push"]

# Workflow files under .github/workflows/ must be byte-identical to the
# version on the default branch for GitHub Actions OIDC token exchange to
# succeed (see claude-review action). Exclude them from formatting hooks.
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", exclude = "^\\.github/workflows/" },
  { id = "end-of-file-fixer", exclude = "^\\.github/workflows/" },
  { id = "mixed-line-ending", exclude = "^\\.github/workflows/" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.8"
hooks = [{ id = "uv-lock" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "ty",
    name = "ty type check (src)",
    language = "system",
    entry = "uv run ty check src",
    pass_filenames = false,
    files = "^src/.*\\.py$",
  },
  {
    id = "pytest",
    name = "pytest",
    language = "system",
    entry = "uv run pytest",
    pass_filenames = false,
    stages = ["pre-push"],
  },
]
